<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<style>
    
    /* THESE STYLES WERE GENERATED BY CHATGPT*/
    /* Container for the 4 columns */
    #codeTable {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
    }

    /* Each column */
    .column {
        flex: 1 0 22%; /* Adjusted to make sure the columns fit side by side */
        margin: 10px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #f9f9f9;
        box-sizing: border-box;
    }

    /* Section for each array in the column */
    .array-section {
        margin-bottom: 20px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
    }

    h3 {
        margin-top: 0;
        color: #333;
    }

    ul {
        list-style-type: none;
        padding: 0;
    }

    li {
        background-color: #f0f0f0;
        margin: 5px 0;
        padding: 10px;
        border-radius: 5px;
    }
</style>

<body>
    <form>
        <input type="text" id="context"/>
        <button id="get">get</button>
        <button id="post">Query Gemini</button>
        <label>Choose a topic:</label>
        <select id="topics">
            <option value="DataFrame">DataFrame</option>
            <option value="Normalised Mutual Information">NMI (Normalised Mutual Information)</option>
            <option value="Sentence splitting using nltk">Sentence splitting using nltk</option>
            <option value="Correlation">Correlation</option>
            <option value="Linear Regression">Linear Regression</option>
            <option value="Decision Tree Classifier">Decision Tree Classifier</option>
            <option value="Reading/Writing CSV files">Reading/Writing CSV files</option>
        </select>
    </form>

    <h1>Array Elements</h1>
    <div id="codeTable"></div>



    <script>
        //If you query gemini too frequently it will result in an error
        //According to google it is capped at 120 requests in a minute and 
        //google recommends a delay of 1 second between requests
        //DELAY is in milliseconds
        const NUMBER_REQUESTS = 8;
        const DELAY = 100;

        const getBtn = document.getElementById('get')
        const postBtn = document.getElementById('post')
        const context = document.getElementById('context')
        const topic = document.getElementById("topics")
        const answer = document.getElementById("answer")
        //For displaying the response from gemini
        let container = document.getElementById('codeTable');

        const baseURL = 'http://localhost:8383/'
        let responses = [];
        getBtn.addEventListener('click', getInfo)
        postBtn.addEventListener('click', postInfo)        

        async function getInfo(e) {
            e.preventDefault()
            const res = await fetch(baseURL + "info/", {
                method: 'GET'
            })
            console.log(res)
            console.log("Used get info")
            const data = await res.json()
            responses.push(data.info);

            
        }

        //Code from https://masteringjs.io/tutorials/fundamentals/wait-1-second-then
        function delay(time) {
            return new Promise(resolve => setTimeout(resolve, time));
        }



        async function postInfo(e) {
            e.preventDefault();

            // Helper function to delay execution
            function delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            for (let i = 0; i < NUMBER_REQUESTS; i++) {
                if (context.value === '') {
                    console.log("Need to give some context");
                    return;
                }

                const res = await fetch(baseURL, {
                    method: 'POST',
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        parcel: context.value + "|" + topic.value // whatever is in the const input will be sent
                    })
                });

                console.log(res);
                console.log("Used post");
                await getInfo(e); // Assuming getInfo is also async and needs to be awaited

                // Delay so that we don't reach the gemini querying limit
                await delay(DELAY);
            }

            // Assuming responses is defined elsewhere
            console.log(responses);
            displayArrays(responses);
        }

                //THIS FUNCTION WAS GENERATED BY CHATGPT
        // Function to display the arrays in 4 columns
        function displayArrays(arrays) {
            // Split arrays into 4 groups (4 arrays per group)
            const columns = [[], [], [], []];
            let ind = 0;
            arrays.forEach((array, index) => {
                if (array.constructor === Array) {
                    columns[ind].push(array);
                    ind++;
                    ind = ind % 4;
                }
            });

            // Create columns dynamically
            columns.forEach((columnArrays, columnIndex) => {
                // Create a column div
                const columnDiv = document.createElement('div');
                columnDiv.classList.add('column');

                // Create sections for each array in the column
                columnArrays.forEach((arr, arrayIndex) => {
                    const arraySection = document.createElement('div');
                    arraySection.classList.add('array-section');

                    const heading = document.createElement('h3');
                    heading.textContent = `Array ${columnIndex * 4 + arrayIndex + 1}`;
                    arraySection.appendChild(heading);

                    const ul = document.createElement('ul');
                    arr.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = item;
                        ul.appendChild(li);
                    });
                    arraySection.appendChild(ul);

                    // Append the array section to the column
                    columnDiv.appendChild(arraySection);
                });

                // Append the column to the container
                container.appendChild(columnDiv);
            });
        }
    


    </script>
</body>
</html>
